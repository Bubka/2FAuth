name: ci-docker-publish-release
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set tags
        uses: actions/github-script@v9
        id: set_tags
        with:
          # context.ref: For workflows triggered by release, this is the release tag created.
          # A release tag is fully-formed as refs/tags/<tag_name> so we remove the 10 first
          # characters to drop the 'refs/tags/' part.
          script: |
            const tagVersion = context.ref.substring(10);
            const version = tagVersion.replace(/^v/, '');
            const semverRegex =
              /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|[0-9A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|[0-9A-Za-z-][0-9A-Za-z-]*))*))?(?:\+([0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*))?$/;
            const match = version.match(semverRegex)
            if (!match) {
              core.setFailed(`Invalid SemVer version: "${tagVersion}"`);
              return;
            }
            const [, major, minor, patch, prerelease, build] = match;
            let label = '';
            if (prerelease) {
              label += `-${prerelease}`;
            }
            if (build) {
              label += `+${build}`;
            }
            core.setOutput('version', version);
            core.setOutput('major', major);
            core.setOutput('minor', minor);
            core.setOutput('patch', patch);
            core.setOutput('prerelease', prerelease);
            core.setOutput('build', build);
            core.setOutput('label', label);
            core.setOutput('major_minor', `${major}.${minor}`);
            core.setOutput('major_minor_patch', `${major}.${minor}.${patch}`);

      - name: Set variables
        id: set_vars
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "platforms=linux/amd64,linux/386,linux/arm64,linux/arm/v6,linux/arm/v7" >> $GITHUB_OUTPUT

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_RWD_TOKEN }}
          repository: 2fauth/2fauth
          short-description: A web app to manage your Two-Factor Authentication (2FA) accounts and generate their security codes
          readme-filepath: docker/README.md

      - name: Build and push to docker Hub (pre-release)
        if: ${{ steps.set_tags.outputs.label != '' || github.event.release.prerelease == true }}
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ steps.set_vars.outputs.platforms }}
          build-args: |
            CREATED=${{ steps.set_vars.outputs.created }}
            COMMIT=${{ steps.set_vars.outputs.commit }}
            VERSION=${{ steps.set_tags.outputs.version }}
          tags: |
            2fauth/2fauth:${{ steps.set_tags.outputs.version }}
          push: true

      - name: Build and push to docker Hub (stable)
        if: ${{ steps.set_tags.outputs.label == '' && github.event.release.prerelease == false }}
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ steps.set_vars.outputs.platforms }}
          build-args: |
            CREATED=${{ steps.set_vars.outputs.created }}
            COMMIT=${{ steps.set_vars.outputs.commit }}
            VERSION=${{ steps.set_tags.outputs.version }}
          tags: |
            2fauth/2fauth:${{ steps.set_tags.outputs.version }}
            2fauth/2fauth:${{ steps.set_tags.outputs.major }}
            2fauth/2fauth:${{ steps.set_tags.outputs.major_minor }}
            2fauth/2fauth:latest
          push: true
